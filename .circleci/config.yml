version: 2.1

jobs:
  build:
    docker:
      - image: mcr.microsoft.com/dotnet/sdk:8.0
    steps:
      - checkout
      - run:
          name: Restore Dependencies
          command: dotnet restore firstapp/firstapp.csproj
      - run:
          name: Build Project
          command: dotnet build firstapp/firstapp.csproj --configuration Release
      - run:
          name: Run Tests
          command: dotnet test firstapp/firstapp.csproj

workflows:
  version: 2
  build_and_test:
    jobs:
      - build
